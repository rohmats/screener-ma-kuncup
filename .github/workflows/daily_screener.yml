name: Daily MA Kuncup Screener

on:
  schedule:
    # GitHub schedule uses UTC. This is 07:30 WIB (GMT+7) daily.
    - cron: '30 0 * * *'
    # GitHub schedule uses UTC. This is 17:00 WIB (GMT+7) daily.
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

# Cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false  # Continue even if one source fails
      matrix:
        source: [bei, yahoo]
    
    env:
      TZ: Asia/Jakarta

    permissions:
      contents: write  # Required to commit and push results back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener (${{ matrix.source }})
        run: python main.py --source ${{ matrix.source }} --save
        timeout-minutes: 12

      - name: Verify results
        run: |
          echo "Results for ${{ matrix.source }}:"
          ls -lh data/results/*${{ matrix.source }}* 2>/dev/null || echo "No results found"

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screener-results-${{ matrix.source }}
          path: data/results/
          retention-days: 90

      - name: Workflow Step Failed
        if: failure()
        run: |
          echo "Screener failed for source: ${{ matrix.source }}"
          echo "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  commit-results:
    needs: run-screener
    runs-on: ubuntu-latest
    if: always()
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge results
        run: |
          mkdir -p data/results
          find artifacts/ -name "*.csv" -exec cp {} data/results/ \;
          ls -lh data/results/ || echo "No results to merge"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }}
          git add data/results/ data/bei_stocks.csv data/all_stocks.csv 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "📊 Screener results $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
